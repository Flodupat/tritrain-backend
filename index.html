<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<title>TriTrain</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0f1e; --bg2:#111827; --bg3:#1a2235; --border:#1e2d45;
  --text:#e8edf5; --muted:#6b7fa3;
  --swim:#0ea5e9; --swim-bg:rgba(14,165,233,.1);
  --zwift:#22c55e; --zwift-bg:rgba(34,197,94,.1);
  --run:#f97316; --run-bg:rgba(249,115,22,.1);
  --brick:#eab308; --brick-bg:rgba(234,179,8,.1);
  --rest:#64748b; --rest-bg:rgba(100,116,139,.1);
  --race:#ef4444; --race-bg:rgba(239,68,68,.15);
  --ph1:#d97706; --ph2:#22c55e; --ph3:#3b82f6; --ph4:#a855f7;
  --r:12px; --font:'Outfit',sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden}

.header{position:sticky;top:0;z-index:100;background:rgba(10,15,30,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px}
.header-logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
.header-logo span{color:var(--zwift)}
.header-sub{font-size:11px;color:var(--muted);font-family:var(--mono)}

.cbar{background:linear-gradient(135deg,#0f172a,#1e1040);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:12px;overflow-x:auto;scrollbar-width:none}
.cbar::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;border-radius:8px;padding:8px 12px;display:flex;flex-direction:column;gap:2px;min-width:120px}
.chip.m{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3)}
.chip.l{background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3)}
.chip.w{background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.2)}
.chip-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.chip-val{font-size:22px;font-weight:800;font-family:var(--mono);line-height:1}
.chip.m .chip-val{color:var(--zwift)}
.chip.l .chip-val{color:#a855f7}
.chip.w .chip-val{color:var(--swim)}
.chip-sub{font-size:11px;color:var(--muted)}

.view{display:none;padding:16px}
.view.active{display:block}

.sc{border-radius:var(--r);margin-bottom:10px;overflow:hidden;border:1px solid var(--border);transition:transform .15s}
.sc:active{transform:scale(.98)}
.sc-hd{display:flex;align-items:center;gap:10px;padding:12px 14px 10px}
.sbadge{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.smeta{flex:1;min-width:0}
.ssport{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px}
.stitle{font-size:14px;font-weight:600;line-height:1.3}
.sright{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.sdur{font-family:var(--mono);font-size:13px;font-weight:500}
.slvl{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.dtoggle{display:flex;align-items:center;gap:6px;padding:8px 14px;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);border-top:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02)}
.dbody{display:none}
.dbody.open{display:block}
.dtext{font-size:12px;line-height:1.6;color:var(--muted);padding:10px 14px 12px}

.sport-Z .sbadge{background:var(--zwift-bg)} .sport-Z .ssport{color:var(--zwift)} .sport-Z .sdur{color:var(--zwift)} .sport-Z .sc{background:linear-gradient(135deg,var(--bg2) 0%,rgba(34,197,94,.04) 100%)}
.sport-S .sbadge{background:var(--swim-bg)} .sport-S .ssport{color:var(--swim)} .sport-S .sdur{color:var(--swim)} .sport-S .sc{background:linear-gradient(135deg,var(--bg2) 0%,rgba(14,165,233,.04) 100%)}
.sport-R .sbadge{background:var(--run-bg)} .sport-R .ssport{color:var(--run)} .sport-R .sdur{color:var(--run)} .sport-R .sc{background:linear-gradient(135deg,var(--bg2) 0%,rgba(249,115,22,.04) 100%)}
.sport-BZ .sbadge{background:var(--brick-bg)} .sport-BZ .ssport{color:var(--brick)} .sport-BZ .sdur{color:var(--brick)} .sport-BZ .sc{background:linear-gradient(135deg,var(--bg2) 0%,rgba(234,179,8,.04) 100%)}
.sport-X .sbadge{background:var(--rest-bg)} .sport-X .ssport{color:var(--rest)} .sport-X .sc{background:var(--bg2)}
.sport-RACE .sbadge{background:var(--race-bg)} .sport-RACE .ssport{color:var(--race)} .sport-RACE .sc{background:linear-gradient(135deg,var(--bg2) 0%,rgba(239,68,68,.08) 100%);border-color:rgba(239,68,68,.4)}
.lvl-Intense{background:rgba(249,115,22,.2);color:var(--run)} .lvl-Max{background:rgba(239,68,68,.2);color:var(--race)} .lvl-Facile{background:rgba(34,197,94,.2);color:var(--zwift)} .lvl-Mod{background:rgba(107,127,163,.15);color:var(--muted)}

.wknav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.wkbtn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.wkbtn:active{background:var(--bg3)}
.wkinfo{text-align:center}
.wknum{font-size:15px;font-weight:700}
.wkdts{font-size:11px;color:var(--muted);font-family:var(--mono)}

.ppill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:14px}
.dlrow{display:flex;align-items:center;gap:8px;padding:6px 0;margin-bottom:4px}
.dlbl{font-size:11px;font-weight:700;color:var(--muted);font-family:var(--mono);letter-spacing:1px;min-width:32px}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--zwift);flex-shrink:0}

.ph-block{margin-bottom:24px}
.ph-hd{padding:10px 14px;border-radius:var(--r) var(--r) 0 0;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.wrow{background:var(--bg2);border:1px solid var(--border);border-top:none;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
.wrow:last-child{border-radius:0 0 var(--r) var(--r)}
.wrow:active{background:var(--bg3)}
.wnum{font-family:var(--mono);font-size:13px;font-weight:600;min-width:28px}
.wdts{font-size:11px;color:var(--muted);min-width:100px}
.wspts{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.sdot{width:8px;height:8px;border-radius:50%}
.wtot{font-size:11px;color:var(--muted);font-family:var(--mono)}

.section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.page-pb{padding-bottom:calc(70px + env(safe-area-inset-bottom))}

.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,30,.95);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--font);transition:color .2s}
.bni.active{color:var(--zwift)}
.bni-icon{font-size:20px;margin-bottom:3px;line-height:1}
.bni-lbl{font-size:10px;font-weight:600;letter-spacing:.5px}

.today-dt{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.today-hl{font-size:26px;font-weight:800;margin-bottom:4px}
.today-wk{font-size:13px;margin-bottom:20px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .ei{font-size:40px;margin-bottom:12px}
.empty h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty p{font-size:13px;line-height:1.6}

/* Zones */
.zones-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.zone-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px}
.zone-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.zone-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.zone-label{font-size:11px;color:var(--muted)}
.zone-val{font-size:11px;font-weight:600;font-family:var(--mono)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ai{animation:fadeIn .3s ease both}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">TRI<span>TRAIN</span></div>
    <div class="header-sub">FTP 213W · Semi ~1h35</div>
  </div>
  <div id="todayBadge" style="font-size:12px;color:var(--muted);font-family:var(--mono)"></div>
</div>

<div class="cbar">
  <div class="chip m"><div class="chip-lbl">Tri M</div><div class="chip-val" id="dM">—</div><div class="chip-sub">15 mai · 1,9-90-21km</div></div>
  <div class="chip l"><div class="chip-lbl">Tri L</div><div class="chip-val" id="dL">—</div><div class="chip-sub">5 juil · 3,8-180-42km</div></div>
  <div class="chip w"><div class="chip-lbl">Semaine</div><div class="chip-val" id="cwn">—</div><div class="chip-sub" id="cpn">—</div></div>
</div>

<div id="view-today"  class="view active page-pb"><div id="todayC"></div></div>
<div id="view-week"   class="view page-pb">
  <div class="wknav">
    <button class="wkbtn" onclick="chWk(-1)">‹</button>
    <div class="wkinfo"><div class="wknum" id="wkN"></div><div class="wkdts" id="wkD"></div></div>
    <button class="wkbtn" onclick="chWk(+1)">›</button>
  </div>
  <div id="weekC"></div>
</div>
<div id="view-prog"   class="view page-pb"><div id="progC"></div></div>
<div id="view-zones"  class="view page-pb"><div id="zonesC"></div></div>

<div class="bnav">
  <button class="bni active" onclick="sv('today',this)"><div class="bni-icon">📅</div><div class="bni-lbl">Aujourd'hui</div></button>
  <button class="bni" onclick="sv('week',this)"><div class="bni-icon">📆</div><div class="bni-lbl">Semaine</div></button>
  <button class="bni" onclick="sv('prog',this)"><div class="bni-icon">📋</div><div class="bni-lbl">Programme</div></button>
  <button class="bni" onclick="sv('zones',this)"><div class="bni-icon">⚡</div><div class="bni-lbl">Zones</div></button>
</div>

const SICON = {Z:'🖥️',S:'🏊',R:'🏃',BZ:'🖥️🏃',X:'😴',RACE:'🏁'};
const SNAME = {Z:'Zwift',S:'Natation',R:'Course',BZ:'Brick',X:'Repos',RACE:'Course !'};
const SCOL  = {Z:'zwift',S:'swim',R:'run',BZ:'brick',X:'rest',RACE:'race'};

let wkIdx = 0;

function toD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function tds(){const t=new Date();return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`}
function diff(s){const t=new Date();t.setHours(0,0,0,0);const d=toD(s);d.setHours(0,0,0,0);return Math.round((d-t)/864e5)}
function fmtL(s){return toD(s).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
function fmtS(s){return toD(s).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}
function findDay(ds){for(const w of PROGRAM)for(const d of w.days)if(d.date===ds)return{week:w,day:d};return null}
function findWkIdx(ds){
  for(let i=0;i<PROGRAM.length;i++)for(const d of PROGRAM[i].days)if(d.date===ds)return i;
  const t=new Date();t.setHours(0,0,0,0);
  for(let i=0;i<PROGRAM.length;i++){const s=toD(PROGRAM[i].startDate);if(s>=t)return i}
  return 0;
}

function sc(sess, idx){
  const dur = sess.duration>0?`${sess.duration}min`:'';
  const lvl = sess.level!=='-'&&sess.level!=='Mod'?sess.level:'';
  const hasDet = sess.detail&&sess.detail.length>0;
  return`<div class="sc sport-${sess.sport} ai" style="animation-delay:${idx*50}ms">
    <div class="sc-hd">
      <div class="sbadge">${SICON[sess.sport]||'🏃'}</div>
      <div class="smeta">
        <div class="ssport">${SNAME[sess.sport]||sess.sport}</div>
        <div class="stitle">${sess.title}</div>
      </div>
      <div class="sright">
        ${dur?`<div class="sdur">${dur}</div>`:''}
        ${lvl?`<div class="slvl lvl-${sess.level}">${lvl}</div>`:''}
      </div>
    </div>
    ${hasDet?`<div class="dtoggle" onclick="td(this)"><span>▸</span> Détails & exercices</div>
    <div class="dbody"><div class="dtext">${sess.detail.replace(/\|/g,'<br>• ').replace(/^/,'• ')}</div></div>`:''}</div>`
}
function td(el){const b=el.nextElementSibling;b.classList.toggle('open');el.querySelector('span').textContent=b.classList.contains('open')?'▾':'▸'}

function renderToday(){
  const ts=tds(),found=findDay(ts),c=document.getElementById('todayC');
  document.getElementById('todayBadge').textContent=new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  if(!found){c.innerHTML=`<div class="empty"><div class="ei">🏁</div><h3>Programme terminé !</h3><p>Tes deux triathlons sont derrière toi. Bravo !</p></div>`;return}
  const{week:w,day:d}=found;
  let h=`<div class="today-dt">${fmtL(d.date)}</div>
    <div class="today-hl">${d.dayFull}</div>
    <div class="today-wk" style="color:${w.phaseColor}">S${w.week} · ${w.phaseName}</div>`;
  d.sessions.forEach((s,i)=>h+=sc(s,i));
  c.innerHTML=h;
}

function renderWeek(){
  const w=PROGRAM[wkIdx],ts=tds();
  const end=w.days[6]?w.days[6].date:w.days[w.days.length-1].date;
  document.getElementById('wkN').textContent=`Semaine ${w.week} / 18`;
  document.getElementById('wkD').textContent=`${fmtS(w.startDate)} → ${fmtS(end)}`;
  let h=`<div class="ppill" style="background:${w.phaseColor}22;border:1px solid ${w.phaseColor}55;color:${w.phaseColor}">${w.phaseName}</div>`;
  w.days.forEach(day=>{
    const isT=day.date===ts,tot=day.sessions.reduce((a,s)=>a+s.duration,0);
    h+=`<div style="margin-bottom:4px"><div class="dlrow">
      <div class="dlbl">${day.dayShort}</div>
      <div style="font-size:11px;color:var(--muted)">${fmtS(day.date)}</div>
      ${isT?'<div class="tdot"></div><span style="font-size:11px;color:var(--zwift);font-weight:700">Aujourd\'hui</span>':''}
      ${tot>0?`<div style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)">${tot}min</div>`:''}
    </div>`;
    day.sessions.forEach((s,i)=>h+=sc(s,i));
    h+='</div>';
  });
  document.getElementById('weekC').innerHTML=h;
}
function chWk(d){wkIdx=Math.max(0,Math.min(PROGRAM.length-1,wkIdx+d));renderWeek();document.getElementById('view-week').scrollTop=0}

function renderProg(){
  let phases={};
  PROGRAM.forEach(w=>{if(!phases[w.phase])phases[w.phase]={name:w.phaseName,color:w.phaseColor,weeks:[]};phases[w.phase].weeks.push(w)});
  let h='';
  Object.entries(phases).forEach(([ph,p])=>{
    h+=`<div class="ph-block"><div class="ph-hd" style="background:${p.color}22;border:1px solid ${p.color}44;color:${p.color}"><span>Phase ${ph} · ${p.name}</span><span style="font-family:var(--mono);font-size:11px;opacity:.7">${p.weeks.length} sem.</span></div>`;
    p.weeks.forEach(w=>{
      const end=w.days[6]?w.days[6].date:w.days[w.days.length-1].date;
      const sports=[...new Set(w.days.flatMap(d=>d.sessions.map(s=>s.sport)).filter(s=>s!=='X'&&s!=='RACE'))];
      const tot=w.days.reduce((a,d)=>a+d.sessions.reduce((b,s)=>b+s.duration,0),0);
      const hasRace=w.days.some(d=>d.sessions.some(s=>s.sport==='RACE'));
      h+=`<div class="wrow" onclick="jumpWk(${w.week-1})">
        <div class="wnum" style="color:${p.color}">S${w.week}</div>
        <div class="wdts">${fmtS(w.startDate)} → ${fmtS(end)}</div>
        <div class="wspts">${sports.map(s=>`<div class="sdot" style="background:var(--${SCOL[s]})"></div>`).join('')}${hasRace?'🏁':''}</div>
        <div class="wtot">${tot}min</div>
      </div>`;
    });
    h+='</div>';
  });
  document.getElementById('progC').innerHTML=h;
}
function jumpWk(i){wkIdx=i;sv('week',document.querySelectorAll('.bni')[1]);renderWeek()}

function sv(name,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  el.classList.add('active');
}

function init(){
  const dM=diff('2026-05-15'),dL=diff('2026-07-05');
  document.getElementById('dM').textContent=dM>0?`J-${dM}`:dM===0?'AUJOURD\'HUI':'Terminé';
  document.getElementById('dL').textContent=dL>0?`J-${dL}`:dL===0?'AUJOURD\'HUI':'Terminé';
  wkIdx=findWkIdx(tds());
  const cw=PROGRAM[wkIdx];
  if(cw){document.getElementById('cwn').textContent=`S${cw.week}/18`;document.getElementById('cpn').textContent=`Phase ${cw.phase}`}
  renderToday();renderWeek();renderProg();renderZones();
}
